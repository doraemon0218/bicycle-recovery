<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a2e4a" />
    <title>自転車回収記録</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="toast" class="toast"></div>

    <!-- ══════════════ 通常版 ══════════════ -->
    <div id="normalApp" style="display:none;">
      <header class="n-header">
        <div class="n-header-inner">
          <button id="nTopPageBtn" class="n-top-page-btn" title="ロール選択に戻る">🏠</button>
          <div class="n-header-titles">
            <h1>🚲 自転車回収記録</h1>
            <p class="n-sub">不法駐輪回収・警察提出管理</p>
          </div>
          <div id="syncBadge" class="sync-badge offline">● オフライン</div>
        </div>
      </header>

      <nav class="n-tab-nav">
        <button class="n-tab active" data-n-tab="register">📝 登録</button>
        <button class="n-tab" data-n-tab="list">📋 一覧</button>
        <button class="n-tab" data-n-tab="export">📥 CSV</button>
        <button class="n-tab" data-n-tab="settings">⚙️ 設定</button>
      </nav>

      <main class="n-main">
        <!-- 登録 -->
        <section id="nRegisterTab" class="n-page active">
          <!-- 登録完了カード（保存後に表示） -->
          <div id="nCompleteCard" class="n-complete-card" style="display:none;"></div>
          <!-- スタート画面 -->
          <div id="nStartCard" class="n-start-wrap" style="display:none;"></div>
          <!-- ウィザード進捗バー -->
          <div class="n-wiz-progress" id="nWizProgress" style="display:none;">
            <span class="n-wiz-label" id="nWizLabel">ステップ 1/6</span>
            <div class="n-wiz-bar-bg"><div class="n-wiz-bar-fill" id="nWizFill" style="width:0%"></div></div>
          </div>
          <!-- フォーム本体（ウィザード各ステップ） -->
          <div id="nFormCards">
            <!-- Step 1: 防犯登録 -->
            <div class="n-wiz-step active" data-step="0">
              <div class="card">
                <div class="n-wiz-step-title">① 防犯登録シールの確認</div>
                <div class="form-stack">
                  <label>シールの有無 <span class="req">*</span></label>
                  <div class="seg-ctrl" id="hasRegCtrl">
                    <button class="seg-btn active" data-value="yes">あり</button>
                    <button class="seg-btn" data-value="no">なし</button>
                    <button class="seg-btn" data-value="unknown">不明</button>
                  </div>
                  <div id="regSection">
                    <div class="photo-zone">
                      <canvas id="photoPreview" style="display:none;"></canvas>
                      <div id="photoPlaceholder" class="photo-placeholder"><span>シールの写真をここに表示</span></div>
                      <div class="photo-btns">
                        <button class="btn-camera" id="shootBtn">📷 撮影・選択</button>
                        <button class="btn-camera secondary" id="retakeBtn" style="display:none;">↺ 撮り直す</button>
                      </div>
                      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;" />
                    </div>
                    <div id="ocrStatus" class="ocr-status" style="display:none;"></div>
                    <label>防犯登録番号（1回目）</label>
                    <div class="input-with-badge">
                      <input id="regNumber" type="text" inputmode="text" placeholder="例: 東京 12345678" autocomplete="off" />
                      <span id="regOcrBadge" class="ocr-badge" style="display:none;">自動入力</span>
                    </div>
                    <label>防犯登録番号（確認・2回目）</label>
                    <input id="regNumberConfirm" type="text" inputmode="text" placeholder="同じ番号をもう一度入力" autocomplete="off" />
                    <div id="regMatchStatus" class="reg-match" style="display:none;"></div>
                  </div>
                </div>
              </div>
            </div>
            <!-- Step 2: 車体状況 -->
            <div class="n-wiz-step" data-step="1">
              <div class="card">
                <div class="n-wiz-step-title">② 自転車の状態</div>
                <div class="form-stack">
                  <label>状態（複数選択可）</label>
                  <div class="condition-grid" id="conditionGrid"></div>
                  <label style="margin-top:10px;">全体への追記・備考</label>
                  <textarea id="conditionNote" rows="2" placeholder="色・メーカー・特徴など"></textarea>
                </div>
              </div>
            </div>
            <!-- Step 3: 回収位置 -->
            <div class="n-wiz-step" data-step="2">
              <div class="card">
                <div class="n-wiz-step-title">③ 回収した場所</div>
                <div class="form-stack">
                  <button class="btn-location" id="getLocationBtn">📍 現在地を自動取得</button>
                  <div id="locationStatus" class="location-status" style="display:none;"></div>
                  <a id="mapsLink" class="maps-link" style="display:none;" target="_blank" rel="noopener">地図で確認 →</a>
                  <label>住所・目印（任意）</label>
                  <input id="locationNote" type="text" placeholder="例: ○○駅東口 駐輪禁止エリア" />
                </div>
              </div>
            </div>
            <!-- Step 4: 日時 -->
            <div class="n-wiz-step" data-step="3">
              <div class="card">
                <div class="n-wiz-step-title">④ 回収日時</div>
                <div class="form-stack">
                  <button type="button" class="btn-now" id="setNowBtn">🕐 現在日時を入力</button>
                  <input id="collectedAt" type="datetime-local" />
                </div>
              </div>
            </div>
            <!-- Step 5: 保管場所 -->
            <div class="n-wiz-step" data-step="4">
              <div class="card">
                <div class="n-wiz-step-title">⑤ 搬送先保管場所</div>
                <div class="form-stack">
                  <select id="storageLocation"><option value="">選択してください</option></select>
                  <p id="storageAddress" class="field-hint storage-addr"></p>
                </div>
              </div>
            </div>
            <!-- Step 6: 備考・確認 -->
            <div class="n-wiz-step" data-step="5">
              <div class="card">
                <div class="n-wiz-step-title">⑥ 備考・確認して登録</div>
                <div class="form-stack">
                  <label>特記事項（任意）</label>
                  <textarea id="notes" rows="3" placeholder="特記事項があれば入力してください"></textarea>
                  <div id="nWizSummary" class="n-wiz-summary" style="margin-top:10px;"></div>
                </div>
              </div>
              <!-- saveBtn は JS から trigger するため非表示 -->
              <button id="saveBtn" style="display:none;"></button>
            </div>
          </div><!-- /nFormCards -->
          <!-- ウィザードナビ -->
          <div class="n-wiz-nav" id="nWizNav" style="display:none;">
            <button class="n-wiz-back" id="nWizBack" disabled>← もどる</button>
            <button class="n-wiz-next" id="nWizNext">つぎへ →</button>
          </div>
        </section>

        <!-- 一覧 -->
        <section id="nListTab" class="n-page">
          <div class="list-toolbar">
            <input id="searchInput" type="search" placeholder="番号・場所で検索…" />
            <select id="filterStorage"><option value="">全保管場所</option></select>
          </div>
          <div id="recordList" class="record-list"><p class="muted center">登録されたデータがありません。</p></div>
        </section>

        <!-- CSV -->
        <section id="nExportTab" class="n-page">
          <div class="card">
            <h2>CSV出力（警察提出用）</h2>
            <div class="form-stack">
              <label>期間（開始）</label><input id="exportFrom" type="date" />
              <label>期間（終了）</label><input id="exportTo" type="date" />
              <div class="export-summary" id="exportSummary"></div>
              <button id="exportBtn" class="btn-primary btn-large">📥 CSVダウンロード</button>
              <button id="exportAllBtn" class="btn-secondary">全件ダウンロード</button>
            </div>
          </div>
          <div class="card">
            <h2>データ管理</h2>
            <p class="field-hint">端末のストレージに保存されています。</p>
            <div id="storageInfo" class="storage-info"></div>
            <button id="clearSyncedBtn" class="btn-danger-outline">送信済みデータを削除</button>
          </div>
          <div class="card">
            <h2>📊 OCR学習データ出力</h2>
            <p class="field-hint">写真・OCR予測・確定番号のペアデータです。将来の機械学習モデル訓練に使用します。</p>
            <div id="mlSummary" class="export-summary" style="margin-bottom:10px;"></div>
            <button id="mlExportBtn" class="btn-secondary" style="margin-top:0;">📤 学習データをJSON出力</button>
          </div>
        </section>

        <!-- 設定 -->
        <section id="nSettingsTab" class="n-page">
          <div id="nSettingsContent"></div>
        </section>
      </main>
    </div>

    <!-- ══════════════ らくらくver ══════════════ -->
    <div id="silverApp" style="display:none;">
      <header class="sv-header">
        <div class="sv-header-inner">
          <div class="sv-header-left">
            <button id="svTopPageBtn" class="sv-top-page-btn" title="ロール選択に戻る">🏠 戻る</button>
            <div>
              <div class="sv-header-title">🚲 自転車回収記録</div>
              <div class="sv-header-badge">らくらくver</div>
            </div>
          </div>
          <div id="svSyncBadge" class="sync-badge offline">● オフライン</div>
        </div>
      </header>

      <nav class="sv-tab-nav">
        <button class="sv-tab active" data-sv-tab="home">🏠 ホーム</button>
        <button class="sv-tab" data-sv-tab="list">📋 記録一覧</button>
        <button class="sv-tab" data-sv-tab="settings">⚙️ 設定</button>
      </nav>

      <!-- ホーム（登録ウィザード） -->
      <div id="svHomeTab" class="sv-tab-content active">
        <div class="sv-progress-wrap">
          <div class="sv-step-label" id="svStepLabel">ステップ 1 / 5</div>
          <div class="sv-progress-bar-bg">
            <div class="sv-progress-bar-fill" id="svProgressFill"></div>
          </div>
          <button class="sv-reset-btn" id="svResetBtn" style="display:none;">🏠 最初から</button>
        </div>
        <div id="svStepContent" class="sv-step-content"></div>
        <div class="sv-bottom-nav" style="display:none;">
          <button id="svPrevBtn" class="sv-btn-back">← もどる</button>
          <button id="svNextBtn" class="sv-btn-next">つぎへ →</button>
        </div>
      </div>

      <!-- 記録一覧 -->
      <div id="svListTab" class="sv-tab-content">
        <div id="svRecordList" class="sv-record-list">
          <p class="sv-muted">まだ記録がありません。</p>
        </div>
      </div>

      <!-- 設定 -->
      <div id="svSettingsTab" class="sv-tab-content">
        <div id="svSettingsContent"></div>
      </div>
    </div>

    <!-- 詳細モーダル（共通） -->
    <div id="modal" class="modal" style="display:none;">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-box">
        <button class="modal-close" id="modalClose">✕</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
