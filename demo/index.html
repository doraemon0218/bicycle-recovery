<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a2e4a" />
  <title>自転車回収記録システム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: linear-gradient(160deg, #1a2e4a 0%, #2d5a8e 60%, #1a3a6b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .logo { font-size: 3.2rem; margin-bottom: 10px; text-align: center; }
    .title { color: #fff; font-size: 1.45rem; font-weight: 700; text-align: center; margin-bottom: 6px; letter-spacing: 0.02em; }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 0.88rem; text-align: center; margin-bottom: 44px; }
    .role-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 380px; }
    .role-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: none;
      cursor: pointer;
    }
    .role-card:active { transform: scale(0.97); }
    @media (hover: hover) { .role-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.32); } }
    .role-icon { font-size: 2.6rem; flex-shrink: 0; line-height: 1; }
    .role-info { flex: 1; text-align: left; }
    .role-name { font-size: 1.18rem; font-weight: 700; color: #1a2e4a; margin-bottom: 4px; }
    .role-desc { font-size: 0.8rem; color: #667; line-height: 1.45; }
    .role-card.worker .role-name { color: #1a4a2e; }
    .role-card.police .role-name { color: #1a2e6a; }
    .arrow { color: #bbb; font-size: 1.4rem; flex-shrink: 0; }
    .footer { margin-top: 40px; color: rgba(255,255,255,0.3); font-size: 0.73rem; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">🚲</div>
  <div class="title">自転車回収記録システム</div>
  <div class="subtitle">利用するロールを選択してください</div>

  <div class="role-cards">
    <a class="role-card worker" href="./worker.html">
      <span class="role-icon">👷</span>
      <span class="role-info">
        <div class="role-name">撤去作業員</div>
        <div class="role-desc">違法駐輪自転車の回収・記録登録<br>CSV出力（警察提出用）</div>
      </span>
      <span class="arrow">›</span>
    </a>
    <a class="role-card police" href="./police.html">
      <span class="role-icon">👮</span>
      <span class="role-info">
        <div class="role-name">警察</div>
        <div class="role-desc">照会・処理情報の追記（1件ずつ）<br>処理済みCSVのサーバー送信・管理</div>
      </span>
      <span class="arrow">›</span>
    </a>
  </div>

  <div class="footer">不法駐輪回収管理システム</div>
</body>
</html>
